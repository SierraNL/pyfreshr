[project]
name = "pyfreshr"
version = "0.9.0"
description = "A small Python library to login to a website and scrape data into structured objects."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [ "requests>=2.30", "aiohttp>=3.8" ]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

include = ["pyfreshr*"]

name: Build Python package

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install package
        run: pip install .

      - name: Lint
        run: python -m ruff check src/ tests/ examples/

      - name: Run tests
        run: pytest -v --cov --cov-report=term-missing

      - name: Warn if coverage below 85%
        run: python -m coverage report --fail-under=85 || echo "::warning::Coverage dropped below 85%"

      - name: Build distribution (only on latest Python)
        if: matrix.python-version == '3.14'
        run: |
          pip install build
          python -m build

      - name: Upload built artifacts
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/pyfreshr

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
